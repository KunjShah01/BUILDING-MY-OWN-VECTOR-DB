name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

# ─────────────────────────────────────────────────────────────────────────────
#  Python tests — standalone (no external services) + DB/Redis-dependent
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vector_user
          POSTGRES_PASSWORD: vector_password
          POSTGRES_DB: vector_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --prefer-binary -r requirements.txt
        pip install --prefer-binary \
          pytest-cov \
          pytest-asyncio \
          pytest-xdist \
          pytest-mock \
          pip-audit

    - name: Syntax check all Python files
      run: |
        ERRORS=$(find . -name "*.py" -not -path "./.venv/*" -not -path "./*/__pycache__/*" -exec python -m py_compile {} \; 2>&1)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
          echo "❌ Syntax errors found!"
          exit 1
        fi
        echo "All Python files compile clean"

    - name: Security scan
      run: |
        pip-audit --exit-code 0  # non-blocking: reports vulns but allows CI to pass

    - name: Run standalone tests (no external services required)
      env:
        DATABASE_URL: "sqlite:///:memory:"
        REDIS_URL: ""
        API_KEY: "test-key-ci"
        PYTEST_CURRENT_TEST: "1"
      run: |
        python -m pytest test/ \
          --ignore=test/test_vector_db.py \
          --ignore=test/test_api.py \
          --ignore=test/test_comprehensive.py \
          --ignore=test/test_collections_api.py \
          --ignore=test/test_multimodal.py \
          --ignore=test/test_multimodal_media.py \
          --ignore=test/test_e2e_integration.py \
          --ignore=test/test_cloud_platform.py \
          --ignore=test/test_sparse_service.py \
          -v --tb=short \
          --asyncio-mode=auto \
          -n auto \
          --cov=utils --cov=services --cov=api --cov=models \
          --cov-report=term \
          --cov-report=xml \
          -W ignore::DeprecationWarning

    - name: Create DB schema
      env:
        DATABASE_URL: postgresql://vector_user:vector_password@localhost:5432/vector_db_test
      run: |
        python -c "
        import asyncio
        from config.database import Base
        from sqlalchemy.ext.asyncio import create_async_engine

        async def init():
            url = 'postgresql+asyncpg://vector_user:vector_password@localhost:5432/vector_db_test'
            engine = create_async_engine(url)
            async with engine.begin() as conn:
                await conn.run_sync(Base.metadata.create_all)
            await engine.dispose()
            print('✅ Schema created successfully')

        asyncio.run(init())
        "

    - name: Run DB-dependent tests
      env:
        DATABASE_URL: postgresql://vector_user:vector_password@localhost:5432/vector_db_test
        REDIS_URL: redis://localhost:6379/0
        API_KEY: "test-key-ci"
      run: |
        python -m pytest \
          test/test_vector_db.py \
          test/test_collections_api.py \
          test/test_multimodal.py \
          test/test_multimodal_media.py \
          test/test_e2e_integration.py \
          test/test_cloud_platform.py \
          test/test_sparse_service.py \
          -v --tb=short \
          -W ignore::DeprecationWarning \
          --asyncio-mode=auto \
          --cov=utils --cov=services --cov=api --cov=models \
          --cov-report=term \
          --cov-append \
          --cov-report=xml \
          || echo "⚠️  Some DB-dependent tests failed (may need pgvector extension)"

    - name: Run search engine tests
      env:
        REDIS_URL: redis://localhost:6379/0
      run: |
        python -m pytest search_engine/tests/ \
          -v --tb=short \
          -W ignore::DeprecationWarning \
          || echo "⚠️  Some search engine tests failed"

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  # ───────────────────────────────────────────────────────────────────────────
  #  TypeScript SDK
  # ───────────────────────────────────────────────────────────────────────────
  ts-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: sdk/typescript/package-lock.json

    - name: Install dependencies
      run: npm ci --prefer-offline

    - name: Type check
      run: npx tsc --noEmit

    - name: Run tests
      run: npm test

    - name: Build
      run: npm run build

    - name: npm audit
      run: npm audit --audit-level=critical

  # ───────────────────────────────────────────────────────────────────────────
  #  Go SDK
  # ───────────────────────────────────────────────────────────────────────────
  go-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.21"
        cache: true
        cache-dependency-path: sdk/go/go.sum

    - name: Build
      run: go build ./vectordb/...

    - name: Vet
      run: go vet ./vectordb/...

    - name: Test
      run: go test ./vectordb/... -count=1 -timeout 60s

  # ───────────────────────────────────────────────────────────────────────────
  #  Python SDK
  # ───────────────────────────────────────────────────────────────────────────
  py-sdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: sdk/pyproject.toml

    - name: Install SDK with test deps
      run: |
        pip install --prefer-binary -e "sdk[dev]"
        pip install --prefer-binary pytest-mock

    - name: Run tests
      run: pytest sdk/tests/ -v --tb=short -n auto

  # ───────────────────────────────────────────────────────────────────────────
  #  Lint (Ruff)
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install lint tools
      run: pip install ruff

    - name: Lint
      run: ruff check . --ignore=E501,F401

  # ───────────────────────────────────────────────────────────────────────────
  #  Docker build & push (main branch only)
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/vector-db:latest
          ${{ secrets.DOCKER_USERNAME }}/vector-db:${{ github.sha }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/vector-db:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
